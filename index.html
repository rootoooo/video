<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道法自然</title>
    <link rel="icon" type="jpge"href="https://i.haoss.eu.org/file/ba2dfcf9e8533837d9777.jpg" />
    <style type="text/css">
        *{
            margin:0;
            padding:0;
        }
        body{
            font-family:"微软雅黑";
            background-color:rgba(75, 174, 240, 0.6);
            min-height: 100vh;
            position: relative;
        }
        .box {
            position: absolute;
            left: 50%;
            top: 30%;
            transform: translate(-50%,-50%);
            width: 80%;
            padding:20px;
            background-color: #fff;
        }
        #myselect {
            width: 100%;
            padding: 8px;
            font-size: 18px;
        }
        #vipurl {
            width: 98%;
            padding: 8px;
            font-size: 18px;
        }
        .button {
            cursor: pointer;
            width: 100%;
            height: 40px;
            background: #444444;
            color:#FFFFFF;
            text-align:center;
            font-size: 18px;
            line-height: 40px;
            border:none;
        }
        .button:hover{ 
            background: #BBBBBB;
            color:#444444;
        }
        footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            background-color: #f0f0f0;
            color: #444444;
        }
    </style>
    <script> 
        function geturl(){ 
            var api = document.getElementById("myselect");
            var apiUrl = api.options[api.selectedIndex].value;
            var inputUrl = document.getElementById("vipurl").value;
            var myUrl = apiUrl + inputUrl; 
            window.open(myUrl);
        }
    </script> 
</head>

<body> 
    <div class="box">
        <p align="center">
            <b style="font-size:28px;color:#444444;">时也，命也，运也，非吾之所能也！</b>
            <small><i style="color:#888888;">By Jenas</i></small>
        </p>
        <label>
            <p><b style="font-size: 20px;color:#444444">命里有时终须有，命里无时莫强求！</b></p>
            <select id="myselect" class="textbox">
                <optgroup label="半生风雨孤舟渡">
                    <option value="https://jx.xmflv.com/?url=" >一命二运三风水</option>
                </optgroup>
                <optgroup label="苦尽甘来万象新">
                    <option value="https://jx.xmflv.cc/?url=" >四积阴德五读书</option>
                    <option value="https://jx.mmkv.cn/tv.php?url=" >六名七相八敬神</option>
                    <option value="https://jx.playerjy.com/?url=" >九交贵人十养生</option>
                </optgroup>
            </select>
        </label>
        <br><br>
        <label>
            <p><b style="font-size: 20px;color:#444444">天地本无极</b></p>
            <input type="url" id="vipurl" name="vipurl" placeholder="太极生两仪，两仪生四象，四象生八卦，八卦定吉凶，吉凶生大业！" required >
        </label>
        <br><br>
        <input type="submit" class="button" value="临兵斗者皆阵列前行" onclick="geturl()">
    </div>

    <footer>
        穷算命运富烧香，颠颠倒倒问阴阳；若是做好分内事，何须鬼神赐良方；十人烧香九为财，又有几炷真香来；神明不缺三炷香，善心善念财自来！
    </footer>
</body>
</html>
