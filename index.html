<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮皮虾</title>
    <link rel="icon" type="image/jpeg" href="https://im.gurl.eu.org/file/AgACAgEAAxkDAAIUUWd_xyKFSvPJ2QIkbc5QMCd79gWiAAL_rTEbl5EBRDBGmoz44374AQADAgADeAADNgQ.jpg" />
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "微软雅黑";
            background-color: rgba(75, 174, 240, 0.6);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .box {
            width: 80%;
            max-width: 600px;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            text-align: center;
        }
        #myselect,
        #vipurl {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            margin-top: 10px;
        }
        .button {
            cursor: pointer;
            width: 100%;
            height: 45px;
            margin-top: 20px;
            background: #444444;
            color: #FFFFFF;
            text-align: center;
            font-size: 18px;
            line-height: 45px;
            border: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .button:hover {
            background: #BBBBBB;
            color: #444444;
        }
        footer {
            margin-top: 30px;
            padding: 10px;
            font-size: 18px;
            background-color: transparent;
            color: #333333;
            width: 100%;
            text-align: center;
            line-height: 1.8;
        }
    </style>
    <script>
        function geturl() {
            var api = document.getElementById("myselect");
            var apiUrl = api.options[api.selectedIndex].value;
            var inputUrl = document.getElementById("vipurl").value;
            var myUrl = apiUrl + inputUrl;
            window.open(myUrl);
        }
    </script>
</head>

<body>
    <div class="box">
        <p>
            <b style="font-size:28px;color:#444444;">时也，命也，运也，非吾之所能也！</b><br>
            <small><i style="color:#888888;">By Jenas</i></small>
        </p>
        <br>
        <p><b style="font-size: 20px;color:#444444">命里有时终须有，命里无时莫强求！</b></p>
        <select id="myselect">
            <optgroup label="半生风雨孤舟渡">
                <option value="https://jx.playerjy.com/?url=">一命二运三风水</option>
            </optgroup>
            <optgroup label="苦尽甘来万象新">
                <option value="https://jx.xmflv.com/?url=">四积阴德五读书</option>
                <option value="https://jx.m3u8.tv/jiexi/?url=">六名七相八敬神</option>
                <option value="https://www.pangujiexi.com/jiexi/?url=">九交贵人十养生</option>
            </optgroup>
        </select>
        <br>
        <p><b style="font-size: 20px;color:#444444">天地本无极</b></p>
        <input type="url" id="vipurl" name="vipurl" placeholder="太极生两仪，两仪生四象，四象生八卦，八卦定吉凶，吉凶生大业，大业必有小成，小成必有大成！" required>
        <br>
        <input type="submit" class="button" value="临兵斗者皆阵列前行" onclick="geturl()">
    </div>

    <footer>
        穷算命运富烧香，颠颠倒倒问阴阳；若是做好分内事，何须鬼神赐良方；<br>
        十人烧香九为财，又有几炷真香来；神明不缺三炷香，善心善念财自来！
    </footer>
</body>
</html>
